name: Build & Publish Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: file:./data/recipes.db
      - run: npx tsc --noEmit

  prepare:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.lower.outputs.image }}
    steps:
      - name: Lowercase image name
        id: lower
        run: echo "image=ghcr.io/${REPO,,}" >> $GITHUB_OUTPUT
        env:
          REPO: ${{ github.repository }}

  build:
    needs: prepare
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      setup-qemu: true
      cache: true
      cache-scope: build
      fail-fast: true
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      platforms: linux/amd64,linux/arm64      
      meta-images: ${{ needs.prepare.outputs.image }}
      meta-tags: |
        type=raw,value=latest,enable={{is_default_branch}}
        type=sha,prefix=sha-
        type=ref,event=branch
      # FIXME: GHCR does not support the referrers API and spams the registry with sha-tagged images when cosigned: https://github.com/docker/github-builder/issues/109
      sign: false
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Service Webhook
        uses: newarifrh/portainer-service-webhook@v1
        with:
          webhook_url: ${{ secrets.PORTAINER_WEBHOOK_URL }}
