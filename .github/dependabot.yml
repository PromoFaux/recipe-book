version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      nextjs:
        patterns:
          - "next"
          - "next-auth"
          - "@auth/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "autoprefixer"
          - "postcss"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
